ame: Refresh X feed cache

# Fetches the @AljoufCluster timeline from X's public syndication endpoint on
# GitHub's runners (which X serves, unlike datacenter hosts) and writes it to
# the Supabase external_feed_cache table. The site's /api/x-feed function then
# serves this cached copy, so the homepage feed works even when the host's own
# request to X is blocked.
#
# Requires two repository secrets:
#   SUPABASE_URL                (your project URL)
#   SUPABASE_SERVICE_ROLE_KEY   (Project Settings → API → service_role key)

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/refresh-x-feed.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
