<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غير متصل | Offline — مستشفى الحديثة العام</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fb;
        color: #17213d;
        font-family: "IBM Plex Sans Arabic", Tahoma, "Segoe UI", Arial, sans-serif;
        text-align: center;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #07132f;
          color: #f7fbff;
        }
      }
      main {
        display: grid;
        gap: 12px;
        justify-items: center;
        max-width: 420px;
      }
      h1 {
        margin: 0;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        opacity: 0.75;
        line-height: 1.8;
      }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 6px;
        background: #007fa5;
        color: #fff;
        font: inherit;
        font-weight: 700;
        padding: 12px 22px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>
        تعذّر الوصول إلى بوابة مستشفى الحديثة العام. تحقق من اتصالك ثم أعد المحاولة.
        <br />
        You appear to be offline. Check your connection and try again.
      </p>
      <button onclick="location.reload()">إعادة المحاولة / Retry</button>
    </main>
  </body>
</html>
